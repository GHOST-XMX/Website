<!DOCTYPE html>
<html>
  <head>
    <title>GT Gargoyles</title>
    <style>
      body {
        opacity: 0;
        transition: opacity 0.5s ease;
      }
      body.loaded {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <h1>Site is live 🎉</h1>
    <script>
      function showPage() {
        document.body.classList.add('loaded');
      }
      window.addEventListener('DOMContentLoaded', showPage);
      window.addEventListener('pageshow', showPage);
    </script>
  </body>
</html>
